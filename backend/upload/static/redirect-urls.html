<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirect URLs — Shobaz Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* ── Login overlay ── */
    #login-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      display: flex; align-items: center; justify-content: center;
    }
    #login-overlay.hidden { display: none; }
    .login-box {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%; max-width: 380px;
      box-shadow: 0 25px 50px rgba(0,0,0,.5);
    }
    .login-box h2 {
      font-size: 22px; font-weight: 700; color: #f1f5f9;
      margin-bottom: 6px;
    }
    .login-box p { font-size: 13px; color: #94a3b8; margin-bottom: 28px; }
    .login-box label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 6px; }
    .login-box input {
      width: 100%; padding: 10px 14px;
      background: #0f172a; border: 1px solid #334155;
      border-radius: 8px; color: #e2e8f0; font-size: 14px;
      margin-bottom: 16px; outline: none;
      transition: border-color .2s;
    }
    .login-box input:focus { border-color: #6366f1; }
    .btn-login {
      width: 100%; padding: 11px;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: #fff; font-size: 14px; font-weight: 600;
      border: none; border-radius: 8px; cursor: pointer;
      transition: opacity .2s;
    }
    .btn-login:hover { opacity: .9; }
    #login-error {
      color: #f87171; font-size: 13px; margin-top: 10px;
      text-align: center; min-height: 20px;
    }

    /* ── Top bar ── */
    .topbar {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .topbar-left { display: flex; align-items: center; gap: 10px; }
    .topbar-logo {
      font-size: 18px; font-weight: 800; color: #818cf8;
      letter-spacing: -.5px;
    }
    .topbar-title {
      font-size: 14px; color: #94a3b8;
      border-left: 1px solid #475569; padding-left: 10px;
    }
    .btn-logout {
      font-size: 12px; color: #94a3b8;
      background: none; border: 1px solid #334155;
      padding: 6px 14px; border-radius: 6px; cursor: pointer;
      transition: all .2s;
    }
    .btn-logout:hover { background: #334155; color: #e2e8f0; }

    /* ── Main ── */
    .main { max-width: 900px; margin: 0 auto; padding: 32px 24px; }

    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px;
    }
    .section-header h1 { font-size: 20px; font-weight: 700; color: #f1f5f9; }
    .section-header p { font-size: 13px; color: #64748b; margin-top: 3px; }

    /* ── Add/Edit form card ── */
    .form-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 28px;
    }
    .form-card h2 { font-size: 15px; font-weight: 600; color: #e2e8f0; margin-bottom: 16px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
    @media (max-width: 640px) { .form-row { grid-template-columns: 1fr; } }
    .form-group label {
      display: block; font-size: 12px; color: #94a3b8; margin-bottom: 6px;
    }
    .form-group input {
      width: 100%; padding: 9px 12px;
      background: #0f172a; border: 1px solid #334155;
      border-radius: 8px; color: #e2e8f0; font-size: 13px; outline: none;
      transition: border-color .2s;
    }
    .form-group input:focus { border-color: #6366f1; }
    .form-group input::placeholder { color: #475569; }
    .form-actions { display: flex; gap: 10px; margin-top: 16px; }
    .btn-save {
      padding: 9px 22px;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: #fff; font-size: 13px; font-weight: 600;
      border: none; border-radius: 8px; cursor: pointer;
      transition: opacity .2s;
    }
    .btn-save:hover { opacity: .85; }
    .btn-cancel {
      padding: 9px 18px;
      background: none; border: 1px solid #334155;
      color: #94a3b8; font-size: 13px; border-radius: 8px; cursor: pointer;
      transition: all .2s;
    }
    .btn-cancel:hover { background: #334155; color: #e2e8f0; }
    .form-msg { font-size: 13px; margin-top: 10px; min-height: 18px; }
    .form-msg.success { color: #34d399; }
    .form-msg.error { color: #f87171; }

    /* ── Table ── */
    .table-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      overflow: hidden;
    }
    .table-toolbar {
      padding: 16px 20px;
      border-bottom: 1px solid #334155;
      display: flex; align-items: center; justify-content: space-between;
    }
    .table-toolbar span { font-size: 13px; color: #64748b; }
    .btn-add {
      padding: 8px 18px;
      background: linear-gradient(135deg, #10b981, #059669);
      color: #fff; font-size: 13px; font-weight: 600;
      border: none; border-radius: 8px; cursor: pointer;
      transition: opacity .2s;
    }
    .btn-add:hover { opacity: .85; }

    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .06em;
      color: #64748b; padding: 12px 20px;
      background: #162032; border-bottom: 1px solid #334155;
    }
    td {
      padding: 13px 20px; font-size: 13px; color: #cbd5e1;
      border-bottom: 1px solid #1e2d3d;
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #162032; }

    .url-cell { font-family: 'Courier New', monospace; font-size: 12px; color: #a5b4fc; }
    .arrow { color: #475569; margin: 0 6px; }

    .btn-edit {
      padding: 5px 12px; font-size: 12px; font-weight: 500;
      background: none; border: 1px solid #334155;
      color: #94a3b8; border-radius: 6px; cursor: pointer;
      transition: all .2s; margin-right: 6px;
    }
    .btn-edit:hover { background: #334155; color: #e2e8f0; }
    .btn-delete {
      padding: 5px 12px; font-size: 12px; font-weight: 500;
      background: none; border: 1px solid #4c1d1d;
      color: #f87171; border-radius: 6px; cursor: pointer;
      transition: all .2s;
    }
    .btn-delete:hover { background: #450a0a; border-color: #ef4444; }

    .empty-state {
      text-align: center; padding: 60px 20px; color: #475569;
    }
    .empty-state svg { width: 48px; height: 48px; margin: 0 auto 16px; display: block; opacity: .4; }
    .empty-state p { font-size: 14px; }

    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid #334155; border-top-color: #818cf8;
      border-radius: 50%; animation: spin .7s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- Login overlay -->
<div id="login-overlay">
  <div class="login-box">
    <h2>Admin Login</h2>
    <p>Sign in to manage redirect URLs</p>
    <label>Username</label>
    <input id="login-user" type="text" placeholder="admin username" autocomplete="username" />
    <label>Password</label>
    <input id="login-pass" type="password" placeholder="••••••••" autocomplete="current-password"
      onkeydown="if(event.key==='Enter') doLogin()" />
    <button class="btn-login" onclick="doLogin()">Sign In</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-left">
    <span class="topbar-logo">Shobaz</span>
    <span class="topbar-title">Redirect URLs</span>
  </div>
  <button class="btn-logout" onclick="doLogout()">Logout</button>
</div>

<!-- Main content -->
<div class="main">
  <div class="section-header">
    <div>
      <h1>URL Redirects</h1>
      <p>Redirects take effect within 60 seconds — no rebuild needed</p>
    </div>
  </div>

  <!-- Add / Edit form -->
  <div class="form-card" id="form-card" style="display:none">
    <h2 id="form-title">Add New Redirect</h2>
    <input type="hidden" id="edit-id" />
    <div class="form-row">
      <div class="form-group">
        <label>Label (internal name)</label>
        <input id="f-name" type="text" placeholder="e.g. Old product page" />
      </div>
      <div class="form-group">
        <label>From URL</label>
        <input id="f-from" type="text" placeholder="/old-path" />
      </div>
      <div class="form-group">
        <label>To URL</label>
        <input id="f-to" type="text" placeholder="/new-path" />
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-save" onclick="saveRedirect()">Save Redirect</button>
      <button class="btn-cancel" onclick="cancelForm()">Cancel</button>
    </div>
    <div class="form-msg" id="form-msg"></div>
  </div>

  <!-- Table -->
  <div class="table-card">
    <div class="table-toolbar">
      <span id="table-count">Loading…</span>
      <button class="btn-add" onclick="showAddForm()">+ Add Redirect</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>Label</th>
          <th>From → To</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="3" class="empty-state">
          <span class="spinner"></span> Loading redirects…
        </td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  var API = window.location.hostname === 'localhost'
    ? 'http://localhost:4000'
    : 'https://api.shobaz.com';

  /* ── Auth ── */
  function getToken() { return localStorage.getItem('co_admin_token'); }
  function saveToken(t) { localStorage.setItem('co_admin_token', t); }
  function clearToken() { localStorage.removeItem('co_admin_token'); }

  function showLoginOverlay() {
    document.getElementById('login-overlay').classList.remove('hidden');
  }
  function hideLoginOverlay() {
    document.getElementById('login-overlay').classList.add('hidden');
  }

  function doLogin() {
    var u = document.getElementById('login-user').value.trim();
    var p = document.getElementById('login-pass').value;
    var errEl = document.getElementById('login-error');
    errEl.textContent = '';
    if (!u || !p) { errEl.textContent = 'Please enter username and password.'; return; }

    fetch(API + '/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p }),
    })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d && d.token) {
          saveToken(d.token);
          hideLoginOverlay();
          loadRedirects();
        } else {
          errEl.textContent = 'Invalid username or password.';
        }
      })
      .catch(function() { errEl.textContent = 'Network error. Try again.'; });
  }

  function doLogout() {
    clearToken();
    showLoginOverlay();
    document.getElementById('login-user').value = '';
    document.getElementById('login-pass').value = '';
  }

  /* ── Load redirects ── */
  function loadRedirects() {
    fetch(API + '/api/redirect-url/get-all-basic')
      .then(function(r) {
        if (r.status === 401 || r.status === 403) { clearToken(); showLoginOverlay(); return null; }
        return r.json();
      })
      .then(function(d) {
        if (!d) return;
        var rows = d.data || [];
        renderTable(rows);
      })
      .catch(function() {
        document.getElementById('tbody').innerHTML =
          '<tr><td colspan="3" style="text-align:center;color:#f87171;padding:40px">Failed to load. Check backend connection.</td></tr>';
        document.getElementById('table-count').textContent = '';
      });
  }

  function renderTable(rows) {
    var count = document.getElementById('table-count');
    count.textContent = rows.length + ' redirect' + (rows.length !== 1 ? 's' : '');

    var tbody = document.getElementById('tbody');
    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="3"><div class="empty-state">' +
        '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">' +
        '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/>' +
        '</svg><p>No redirects yet. Click "+ Add Redirect" to create one.</p></div></td></tr>';
      return;
    }

    tbody.innerHTML = rows.map(function(r) {
      return '<tr>' +
        '<td>' + esc(r.name || '—') + '</td>' +
        '<td class="url-cell">' + esc(r.fromUrl || '—') + '<span class="arrow">→</span>' + esc(r.toUrl || '—') + '</td>' +
        '<td>' +
          '<button class="btn-edit" onclick="editRedirect(' + JSON.stringify(r).replace(/"/g, '&quot;') + ')">Edit</button>' +
          '<button class="btn-delete" onclick="deleteRedirect(\'' + r._id + '\')">Delete</button>' +
        '</td>' +
        '</tr>';
    }).join('');
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /* ── Form ── */
  function showAddForm() {
    document.getElementById('form-title').textContent = 'Add New Redirect';
    document.getElementById('edit-id').value = '';
    document.getElementById('f-name').value = '';
    document.getElementById('f-from').value = '';
    document.getElementById('f-to').value = '';
    document.getElementById('form-msg').textContent = '';
    document.getElementById('form-msg').className = 'form-msg';
    document.getElementById('form-card').style.display = 'block';
    document.getElementById('f-name').focus();
    document.getElementById('form-card').scrollIntoView({ behavior: 'smooth' });
  }

  function editRedirect(r) {
    document.getElementById('form-title').textContent = 'Edit Redirect';
    document.getElementById('edit-id').value = r._id;
    document.getElementById('f-name').value = r.name || '';
    document.getElementById('f-from').value = r.fromUrl || '';
    document.getElementById('f-to').value = r.toUrl || '';
    document.getElementById('form-msg').textContent = '';
    document.getElementById('form-msg').className = 'form-msg';
    document.getElementById('form-card').style.display = 'block';
    document.getElementById('f-name').focus();
    document.getElementById('form-card').scrollIntoView({ behavior: 'smooth' });
  }

  function cancelForm() {
    document.getElementById('form-card').style.display = 'none';
  }

  function saveRedirect() {
    var id   = document.getElementById('edit-id').value;
    var name = document.getElementById('f-name').value.trim();
    var from = document.getElementById('f-from').value.trim();
    var to   = document.getElementById('f-to').value.trim();
    var msgEl = document.getElementById('form-msg');

    if (!name) { msgEl.className = 'form-msg error'; msgEl.textContent = 'Label is required.'; return; }
    if (!from || !to) { msgEl.className = 'form-msg error'; msgEl.textContent = 'Both From URL and To URL are required.'; return; }
    if (!from.startsWith('/') || !to.startsWith('/')) {
      msgEl.className = 'form-msg error'; msgEl.textContent = 'URLs must start with / (e.g. /old-page)'; return;
    }

    msgEl.textContent = '';
    var token = getToken();
    var url    = id ? (API + '/api/redirect-url/update/' + id) : (API + '/api/redirect-url/add');
    var method = id ? 'PUT' : 'POST';

    fetch(url, {
      method: method,
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token,
      },
      body: JSON.stringify({ name: name, fromUrl: from, toUrl: to }),
    })
      .then(function(r) {
        if (r.status === 401 || r.status === 403) { clearToken(); showLoginOverlay(); return null; }
        return r.json();
      })
      .then(function(d) {
        if (!d) return;
        if (d.success) {
          msgEl.className = 'form-msg success';
          msgEl.textContent = id ? 'Redirect updated!' : 'Redirect added!';
          setTimeout(function() {
            cancelForm();
            loadRedirects();
          }, 800);
        } else {
          msgEl.className = 'form-msg error';
          msgEl.textContent = d.message || 'Something went wrong.';
        }
      })
      .catch(function() {
        msgEl.className = 'form-msg error';
        msgEl.textContent = 'Network error. Try again.';
      });
  }

  function deleteRedirect(id) {
    if (!confirm('Delete this redirect?')) return;
    var token = getToken();
    fetch(API + '/api/redirect-url/delete/' + id, {
      method: 'DELETE',
      headers: { 'Authorization': 'Bearer ' + token },
    })
      .then(function(r) {
        if (r.status === 401 || r.status === 403) { clearToken(); showLoginOverlay(); return null; }
        return r.json();
      })
      .then(function(d) {
        if (d && d.success) loadRedirects();
      })
      .catch(function() { alert('Delete failed. Try again.'); });
  }

  /* ── Init ── */
  if (getToken()) {
    hideLoginOverlay();
    loadRedirects();
  } else {
    showLoginOverlay();
  }
</script>
</body>
</html>
